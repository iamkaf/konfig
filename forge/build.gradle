plugins {
    id 'com.iamkaf.multiloader.forge'
}

dependencies {
    implementation('net.sf.jopt-simple:jopt-simple:5.0.4') { version { strictly '5.0.4' } }
}

if (requiredProp(project, 'project.minecraft') == '1.16.5') {
    def java17Launcher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(17)
    }
    def minecraftVersion = requiredProp(project, 'project.minecraft')
    def catalog = project.ext.catalogFor.call(project, minecraftVersion)
    def forgeVersion = project.ext.versionOrNull.call(catalog, 'forge')
    def modId = requiredProp(project, 'mod.id')
    def assetIndex = providers.provider { '1.16' }
    def assetsDir = providers.provider { new File(gradle.gradleUserHomeDir, 'caches/forge_gradle/assets') }
    def assetsDirPath = providers.provider { assetsDir.get().absolutePath }
    def legacyForgeNativesDir = layout.buildDirectory.dir('legacy-forge-natives')
    def legacyForgeNativesDirPath = providers.provider { legacyForgeNativesDir.get().asFile.absolutePath }
    def legacyForgeUserdevDir = providers.provider {
        new File(
            gradle.gradleUserHomeDir,
            "caches/forge_gradle/minecraft_user_repo/net/minecraftforge/forge/${minecraftVersion}-${forgeVersion}_mapped_official_${minecraftVersion}"
        )
    }
    def legacyForgeUserdevJar = providers.provider {
        def matches = fileTree(legacyForgeUserdevDir.get()) {
            include '*-recomp.jar'
        }.files
        if (matches.size() != 1) {
            throw new GradleException("Expected exactly one legacy Forge recomp jar in ${legacyForgeUserdevDir.get()}")
        }
        matches.first()
    }
    def legacyForgeLauncherJar = providers.provider {
        def matches = fileTree(legacyForgeUserdevDir.get()) {
            include '*-launcher.jar'
        }.files
        if (matches.size() != 1) {
            throw new GradleException("Expected exactly one legacy Forge launcher jar in ${legacyForgeUserdevDir.get()}")
        }
        matches.first()
    }
    def legacyClientExtraJar = providers.provider {
        def file = new File(gradle.gradleUserHomeDir, "caches/forge_gradle/minecraft_repo/versions/${minecraftVersion}/client-extra.jar")
        if (!file.isFile()) {
            throw new GradleException("Missing legacy Forge client-extra jar at ${file}")
        }
        file
    }
    def legacyMappingsZip = providers.provider {
        def file = new File(gradle.gradleUserHomeDir, "caches/forge_gradle/mcp_repo/net/minecraft/mapping/${minecraftVersion}/mapping-${minecraftVersion}-mapping.zip")
        if (!file.isFile()) {
            throw new GradleException("Missing legacy Forge mappings zip at ${file}")
        }
        file
    }
    def explodedDir = layout.buildDirectory.dir('sourcesSets/main')
    def modClassesValue = providers.provider {
        def explodedPath = explodedDir.get().asFile.absolutePath
        "${modId}%%${explodedPath}${File.pathSeparator}${modId}%%${explodedPath}".toString()
    }
    def legacyRunClasspath = providers.provider {
        def filtered = sourceSets.main.runtimeClasspath.files.findAll { file ->
            !file.absolutePath.startsWith("${rootProject.projectDir.absolutePath}/.gradle/mavenizer/repo/net/minecraftforge/forge/${minecraftVersion}-${forgeVersion}") &&
                !file.absolutePath.startsWith("${rootProject.projectDir.absolutePath}/.gradle/mavenizer/repo/net/minecraft/client-extra/") &&
                !file.absolutePath.startsWith("${rootProject.projectDir.absolutePath}/.gradle/mavenizer/repo/net/minecraft/mappings_official/")
        } as List<File>

        [
            legacyForgeUserdevJar.get(),
            legacyForgeLauncherJar.get(),
            legacyClientExtraJar.get(),
            legacyMappingsZip.get(),
            *filtered,
        ]
    }
    def legacyForgeNativeJars = providers.provider {
        def jars = [] as Set<File>
        jars.addAll(fileTree(new File(gradle.gradleUserHomeDir, 'caches/modules-2/files-2.1/org.lwjgl')) {
            include '**/3.2.2/**/lwjgl*-natives-linux.jar'
        }.files)
        jars.addAll(fileTree(new File(gradle.gradleUserHomeDir, 'caches/modules-2/files-2.1/com.mojang/text2speech/1.11.3')) {
            include '**/**/text2speech-*-natives-linux.jar'
        }.files)

        if (jars.empty) {
            throw new GradleException('Missing legacy Forge LWJGL native jars for 1.16.5 runLegacyClient')
        }

        jars
    }

    def stageLegacyForgeNatives = tasks.register('stageLegacyForgeNatives', Sync) {
        into legacyForgeNativesDir
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        from({
            legacyForgeNativeJars.get().collect { zipTree(it) }
        }) {
            exclude 'META-INF/**', '**/*.sha1', '**/*.git'
        }
        eachFile { details ->
            details.path = details.name
        }
        includeEmptyDirs = false
    }

    minecraft.runs.named('client').configure { run ->
        run.client.set(true)
        run.environment 'assetIndex', assetIndex
        run.environment 'assetDirectory', assetsDirPath
        run.environment 'nativesDirectory', legacyForgeNativesDirPath
        run.systemProperty 'java.library.path', legacyForgeNativesDirPath
        run.systemProperty 'org.lwjgl.librarypath', legacyForgeNativesDirPath
    }

    def dataRun = minecraft.runs.findByName('data')
    if (dataRun != null) {
        dataRun.environment 'assetIndex', assetIndex
        dataRun.environment 'assetDirectory', assetsDirPath
    }

    tasks.configureEach { task ->
        if (task.name in ['runClient', 'runServer'] && task.hasProperty('javaLauncher')) {
            task.javaLauncher.set(java17Launcher)
        }

        if (task.name in ['runClient', 'runData']) {
            task.dependsOn(stageLegacyForgeNatives)
        }
    }

    tasks.register('runLegacyClient', JavaExec) {
        group = 'application'
        description = 'Runs the 1.16.5 Forge client with the legacy userdev launcher.'
        dependsOn(tasks.named('classes'))
        dependsOn(stageLegacyForgeNatives)

        javaLauncher.set(java17Launcher)
        workingDir = layout.projectDirectory.dir('run').asFile
        mainClass.set('net.minecraftforge.userdev.LaunchTesting')
        classpath(project.files(legacyRunClasspath))

        jvmArgs(
            '-Dforge.logging.console.level=debug',
            '-XX:+IgnoreUnrecognizedVMOptions',
            '--add-exports=java.base/sun.security.util=ALL-UNNAMED',
            '--add-exports=jdk.naming.dns/com.sun.jndi.dns=java.naming',
            '--add-opens=java.base/java.util.jar=ALL-UNNAMED'
        )

        environment 'MOD_CLASSES', modClassesValue.get()
        environment 'MCP_MAPPINGS', 'official_1.16.5'
        environment 'MCP_VERSION', '20210115.111550'
        environment 'FORGE_VERSION', forgeVersion
        environment 'FORGE_GROUP', 'net.minecraftforge'
        environment 'MC_VERSION', minecraftVersion
        environment 'assetIndex', assetIndex.get()
        environment 'assetDirectory', assetsDirPath.get()
        environment 'nativesDirectory', legacyForgeNativesDirPath.get()
        environment 'target', 'fmluserdevclient'

        systemProperty 'java.library.path', legacyForgeNativesDirPath.get()
        systemProperty 'org.lwjgl.librarypath', legacyForgeNativesDirPath.get()
    }
}

if (requiredProp(project, 'project.minecraft') == '1.18.2') {
    def java17Launcher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(17)
    }

    def bootstrapLauncherJar = providers.provider {
        def jar = configurations.detachedConfiguration(dependencies.create('cpw.mods:bootstraplauncher:1.1.2'))
            .resolve()
            .find { it.name == 'bootstraplauncher-1.1.2.jar' }
        if (jar == null) {
            throw new GradleException('Missing bootstraplauncher-1.1.2.jar')
        }
        jar
    }

    def legacyBootstrapLauncherJar = providers.provider {
        fileTree(new File(gradle.gradleUserHomeDir, 'caches/modules-2/files-2.1/cpw.mods/bootstraplauncher/1.0.0')) {
            include '**/bootstraplauncher-1.0.0.jar'
            exclude '**/*sources.jar'
        }.singleFile
    }

    def lwjglNativesDir = layout.buildDirectory.dir('lwjgl-natives')
    def lwjglNativeJars = providers.provider {
        def jars = [] as Set<File>
        jars.addAll(fileTree(new File(gradle.gradleUserHomeDir, 'caches/modules-2/files-2.1/org.lwjgl')) {
            include '**/*natives-linux.jar'
        }.files)
        jars.addAll(fileTree(new File(gradle.gradleUserHomeDir, 'caches/modules-2/files-2.1/com.mojang')) {
            include '**/text2speech-*-natives-linux.jar'
        }.files)

        if (jars.empty) {
            throw new GradleException('Missing LWJGL native jars for 1.18.2 Forge runClient')
        }

        jars
    }

    def patchLegacyBootstrapLauncher = tasks.register('patchLegacyBootstrapLauncher') {
        doLast {
            def source = bootstrapLauncherJar.get()
            def target = legacyBootstrapLauncherJar.get()
            def backup = new File(target.parentFile, "${target.name}.konfig-backup")

            if (!backup.exists()) {
                java.nio.file.Files.copy(target.toPath(), backup.toPath())
            }

            if (target.length() != source.length() || !java.util.Arrays.equals(target.bytes, source.bytes)) {
                java.nio.file.Files.copy(source.toPath(), target.toPath(), java.nio.file.StandardCopyOption.REPLACE_EXISTING)
                logger.lifecycle("Patched cached bootstraplauncher-1.0.0.jar with 1.1.2 contents for 1.18.2 Forge dev runs.")
            }
        }
    }

    def extractLwjglNatives = tasks.register('extractLwjglNatives', Sync) {
        dependsOn 'slimeLauncherMetadataForForge'
        into lwjglNativesDir
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        from({
            lwjglNativeJars.get().collect { zipTree(it) }
        }) {
            exclude 'META-INF/**', '**/*.sha1', '**/*.git'
        }
    }

    tasks.configureEach { task ->
        if (task.name in ['runClient', 'runServer'] && task.hasProperty('javaLauncher')) {
            task.dependsOn(patchLegacyBootstrapLauncher)
            task.javaLauncher.set(java17Launcher)
        }

        if (task.name == 'runClient' && task.hasProperty('javaLauncher')) {
            task.dependsOn(extractLwjglNatives)
            task.systemProperty 'java.library.path', lwjglNativesDir.get().asFile.absolutePath
            task.systemProperty 'org.lwjgl.librarypath', lwjglNativesDir.get().asFile.absolutePath
        }
    }
}
