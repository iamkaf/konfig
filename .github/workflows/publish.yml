name: Publish Maven Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Specific version directory to publish. Leave blank to publish all versions.
        required: false
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Publish selected versions to KafMaven
        env:
          MAVEN_PUBLISH_USERNAME: ${{ secrets.MAVEN_PUBLISH_USERNAME }}
          MAVEN_PUBLISH_PASSWORD: ${{ secrets.MAVEN_PUBLISH_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.version }}" ]; then
            if [ ! -d "${{ inputs.version }}" ]; then
              echo "Unknown version directory: ${{ inputs.version }}" >&2
              exit 1
            fi
            versions="${{ inputs.version }}"
          else
            versions="$(just list-versions)"
          fi

          for v in $versions; do
            echo "Publishing $v"
            just publish-version "$v"
          done
